<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SteamToolsLua</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080e;color:#e0e0f0;font-family:Segoe UI,sans-serif;min-height:100vh}
#login{display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;gap:10px}
#login h2{color:#b098ff;font-size:22px;margin-bottom:2px}
#login .sub{color:#686880;font-size:13px;margin-bottom:6px}
#login input{padding:10px 14px;border-radius:6px;border:1px solid #2a2a5a;background:#0a0a16;color:#e0e0f0;font-size:15px;width:280px;outline:none}
#login input:focus{border-color:#7c6fff}
#login button{padding:10px 30px;border-radius:6px;border:none;background:#7c6fff;color:#fff;font-size:15px;cursor:pointer;width:280px}
#login button:hover{background:#6a5ee8}
#login .err{color:#f56565;font-size:13px;display:none}
#app{display:none;flex-direction:column;height:100vh}
header{background:#0a0a16;border-bottom:1px solid #2a2a5a;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
header .l{display:flex;align-items:center;gap:14px}
header h1{font-size:16px;color:#b098ff}
header .stats{display:flex;gap:16px;font-size:12px;color:#686880}
header .stats span{color:#7c6fff;font-weight:600}
header .h-actions{display:flex;gap:8px;align-items:center}
.btn-sm{padding:6px 14px;border-radius:5px;border:none;font-size:12px;cursor:pointer;color:#fff}
.btn-refresh{background:#2a2a5a;color:#e0e0f0}
.btn-refresh:hover{background:#3a3a7a}
.btn-logout{background:transparent;border:1px solid #2a2a5a;color:#686880;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px}
.btn-logout:hover{color:#f56565;border-color:#f56565}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:300px;background:#0a0a14;border-right:1px solid #1a1a38;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .sb-hdr{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center}
#sidebar .sb-hdr h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px}
#sidebar .sb-hdr input{padding:6px 10px;border-radius:4px;border:1px solid #2a2a5a;background:#0a0a16;color:#e0e0f0;font-size:12px;outline:none;width:140px}
#sidebar .sb-hdr input:focus{border-color:#7c6fff}
#dev-list{flex:1;overflow-y:auto;padding:4px 8px}
.dev-item{padding:8px 10px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:background .15s}
.dev-item:hover{background:#14142a;border-color:#2a2a5a}
.dev-item.active{background:#1c1c3a;border-color:#7c6fff}
.dev-item .row1{display:flex;justify-content:space-between;align-items:center}
.dev-item .name{color:#e0e0f0;font-size:13px;font-weight:500}
.dev-item .time{color:#686880;font-size:10px}
.dev-item .meta{color:#585878;font-size:11px;margin-top:2px;display:flex;gap:8px}
.dev-item .meta span{display:inline-block}
.dev-item .badge{display:inline-block;background:#7c6fff20;color:#7c6fff;font-size:9px;padding:1px 6px;border-radius:6px;border:1px solid #7c6fff40}
.dev-item .badge.banned{background:#f5656520;color:#f56565;border-color:#f5656540}
#content{flex:1;padding:20px;overflow-y:auto;background:#06060c}
#content h2{font-size:16px;margin-bottom:16px;color:#b098ff}
.card{background:#0a0a14;border:1px solid #1a1a38;border-radius:8px;padding:20px;margin-bottom:14px}
.card .r{display:flex;margin-bottom:6px;font-size:13px;align-items:center}
.card .l{color:#686880;width:90px;flex-shrink:0}
.card .v{color:#e0e0f0;word-break:break-all}
.card .v.mono{font-family:'Cascadia Code','Fira Code',monospace;font-size:12px}
.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.actions button,.actions select{padding:7px 14px;border-radius:5px;border:none;font-size:12px;cursor:pointer}
.actions select{background:#0a0a16;color:#e0e0f0;border:1px solid #2a2a5a}
.btn-ban{background:#f56565;color:#fff}
.btn-ban:hover{background:#e05050}
.btn-unban{background:#48bb78;color:#fff}
.btn-unban:hover{background:#3ca868}
.btn-man{background:#7c6fff;color:#fff}
.btn-man:hover{background:#6a5ee8}
#banlist{margin-top:4px}
#banlist table{width:100%;border-collapse:collapse;font-size:12px}
#banlist th{text-align:left;padding:8px 10px;border-bottom:2px solid #2a2a5a;color:#7c6fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
#banlist td{padding:7px 10px;border-bottom:1px solid #151530}
#banlist tr:hover td{background:#0a0a16}
.tag-perm{color:#f56565;font-weight:500}
.tag-time{color:#48bb78}
.tag-unban{color:#686880}
#empty-state{text-align:center;color:#585878;padding:80px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
#empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.3}
#empty-state p{font-size:14px}
#manual-section{padding:10px 14px 14px;border-top:1px solid #1a1a38;flex-shrink:0}
#manual-section h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#manual-row{display:flex;gap:6px}
#manual-row input{padding:7px 10px;border-radius:4px;border:1px solid #2a2a5a;background:#0a0a16;color:#e0e0f0;font-size:12px;outline:none;flex:1;min-width:0}
#manual-row input:focus{border-color:#7c6fff}
#manual-row select{padding:6px;border-radius:4px;border:1px solid #2a2a5a;background:#0a0a16;color:#e0e0f0;font-size:12px}
#manual-row button{background:#f56565;color:#fff;border:none;padding:7px 14px;border-radius:4px;cursor:pointer;white-space:nowrap}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #2a2a5a;border-top-color:#7c6fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:6px;color:#fff;font-size:13px;z-index:999;animation:fadeIn .3s;max-width:360px}
.toast.s{background:#48bb78}
.toast.e{background:#f56565}
.toast.i{background:#7c6fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
a{color:#7c6fff;text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a14}
::-webkit-scrollbar-thumb{background:#2a2a5a;border-radius:3px}
.tag-banned{background:#f5656520;color:#f56565;border:1px solid #f5656540;font-size:10px;padding:1px 5px;border-radius:4px}
.nodata{text-align:center;color:#585878;padding:30px;font-size:13px}
@media(max-width:800px){#sidebar{width:220px};#login input{width:240px};#login button{width:240px}}
</style>
</head>
<body>

<div id="login">
  <h2>Admin Panel</h2>
  <p class="sub">SteamToolsLua v2.2.0</p>
  <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
  <button onclick="login()">Enter</button>
  <p class="err" id="pw-err">Wrong password</p>
</div>

<div id="app">
  <header>
    <div class="l">
      <h1>Admin Panel</h1>
      <div class="stats">
        <span id="stat-devices">0</span> devices &middot;
        <span id="stat-banned">0</span> banned &middot;
        <span id="stat-total">0</span> total entries
      </div>
    </div>
    <div class="h-actions">
      <button class="btn-sm btn-refresh" onclick="loadData()">&#x21bb; Refresh</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <div class="sb-hdr">
        <h3>Devices</h3>
        <input type="text" id="search-input" placeholder="Search..." oninput="renderDeviceList()">
      </div>
      <div id="dev-list"></div>
      <div id="manual-section">
        <h3>Manual Ban</h3>
        <div id="manual-row">
          <input type="text" id="manual-id" placeholder="PC name or HWID">
          <select id="manual-dur">
            <option value="0">Permanent</option>
            <option value="24">24h</option>
            <option value="72">3d</option>
            <option value="168">7d</option>
            <option value="720">30d</option>
          </select>
          <button onclick="manualBan()">Ban</button>
        </div>
      </div>
    </div>

    <div id="content">
      <div id="device-detail">
        <div id="empty-state">
          <div class="icon">&#128187;</div>
          <p>Select a device to view details</p>
        </div>
      </div>

      <div id="banlist" style="display:none">
        <div class="card" style="padding:14px 20px">
          <h2 style="margin:0;font-size:14px">Blacklist</h2>
        </div>
        <table>
          <thead><tr><th>Identifier</th><th>Duration</th><th>Added</th><th>Action</th></tr></thead>
          <tbody id="banlist-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'Ekrem0579';
const GIST_ID = '6f3df9ed457b97936420526d5f5a431b';
const _t1 = 'ghp_rADDDrhWAnkSnCDbV5g2Ynhx8z' + 'LASt3B0vvq';
const GIST_API = 'https://api.github.com/gists/' + GIST_ID;

let TOKEN = '';
let devices = [];
let blacklist = { bans: [], unbans: [] };
let selectedIdx = -1;

function hd() { return { 'Authorization': 'token ' + TOKEN, 'User-Agent': 'AdminPanel', 'Accept': 'application/vnd.github.v3+json' }; }

function login() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    TOKEN = _t1;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadData();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('token-input').value = '';
  document.getElementById('pw-err').style.display = 'none';
}

async function loadData() {
  document.getElementById('dev-list').innerHTML = '<div class="nodata"><div class="spinner"></div> Loading...</div>';
  await Promise.all([loadDevices(), loadBlacklist()]);
}

async function loadDevices() {
  try {
    const r = await fetch(GIST_API, { headers: hd() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const fc = data.files && data.files['devices.json'];
    devices = fc && fc.content ? (JSON.parse(fc.content) || []) : [];
    if (!Array.isArray(devices)) devices = [];
  } catch(e) {
    console.error(e);
    devices = [];
  }
  renderDeviceList();
}

async function loadBlacklist() {
  try {
    const r = await fetch(GIST_API, { headers: hd() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const fc = data.files && data.files['blacklist.json'];
    if (fc && fc.content) {
      blacklist = JSON.parse(fc.content);
      if (!blacklist.bans) blacklist.bans = [];
      if (!blacklist.unbans) blacklist.unbans = [];
    } else {
      blacklist = { bans: [], unbans: [] };
    }
  } catch(e) {
    console.error(e);
    blacklist = { bans: [], unbans: [] };
  }
  renderBlacklist();
  updateStats();
}

async function saveBlacklist() {
  await fetch(GIST_API, {
    method: 'PATCH', headers: hd(),
    body: JSON.stringify({ files: { 'blacklist.json': { content: JSON.stringify(blacklist, null, 2) } } })
  });
}

function updateStats() {
  document.getElementById('stat-devices').textContent = devices.length;
  let bc = 0;
  for (const b of blacklist.bans) {
    const id = b.split(':')[0].toLowerCase();
    if (!blacklist.unbans.includes(id)) bc++;
  }
  document.getElementById('stat-banned').textContent = bc;
  document.getElementById('stat-total').textContent = (devices.length + blacklist.bans.length + blacklist.unbans.length);
}

function isBannedId(id) {
  if (!id) return false;
  const l = id.toLowerCase();
  if (blacklist.unbans.includes(l)) return false;
  return blacklist.bans.some(b => b.split(':')[0].toLowerCase() === l);
}

function renderDeviceList() {
  const el = document.getElementById('dev-list');
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (devices.length === 0) {
    el.innerHTML = '<div class="nodata">No devices logged yet</div>';
    updateStats();
    return;
  }
  const sorted = [...devices].reverse();
  const filtered = q ? sorted.filter(d =>
    (d.user && d.user.toLowerCase().includes(q)) ||
    (d.pc && d.pc.toLowerCase().includes(q)) ||
    (d.hwid && d.hwid.toLowerCase().includes(q)) ||
    (d.ip && d.ip.includes(q))
  ) : sorted;
  if (filtered.length === 0) {
    el.innerHTML = '<div class="nodata">No matching devices</div>';
    return;
  }
  el.innerHTML = filtered.map((d, i) => {
    const realIdx = devices.indexOf(d);
    const act = realIdx === selectedIdx ? ' active' : '';
    const banned = isBannedId(d.pc) || isBannedId(d.hwid);
    const nm = d.user || d.pc || 'Unknown';
    const tm = d.time ? new Date(d.time).toLocaleString() : '';
    return '<div class="dev-item' + act + '" onclick="selectDevice(' + realIdx + ')">' +
      '<div class="row1"><span class="name">' + esc(nm) + (banned ? ' <span class="tag-banned">BANNED</span>' : '') + '</span><span class="time">' + esc(d.pc || '') + '</span></div>' +
      '<div class="meta"><span>' + esc(d.pc || '') + '</span>' + (d.hwid ? '<span>' + d.hwid.substring(0,10) + '...</span>' : '') + '<span>' + tm + '</span></div>' +
      '</div>';
  }).join('');
  updateStats();
}

function selectDevice(idx) {
  selectedIdx = idx;
  renderDeviceList();
  const d = devices[idx];
  if (!d) return;
  const el = document.getElementById('device-detail');
  document.getElementById('banlist').style.display = 'block';
  const nm = d.user || d.pc || 'Unknown';
  const banned = isBannedId(d.pc) || isBannedId(d.hwid);
  el.innerHTML =
    '<div class="card">' +
    '<h2>' + esc(nm) + (banned ? ' <span class="tag-banned">BANNED</span>' : '') + '</h2>' +
    '<div class="r"><div class="l">Username</div><div class="v">' + esc(d.user || '-') + '</div></div>' +
    '<div class="r"><div class="l">PC Name</div><div class="v mono">' + esc(d.pc || '-') + '</div></div>' +
    '<div class="r"><div class="l">HWID</div><div class="v mono" style="font-size:11px">' + esc(d.hwid || '-') + '</div></div>' +
    '<div class="r"><div class="l">IP</div><div class="v mono">' + esc(d.ip || '-') + '</div></div>' +
    '<div class="r"><div class="l">Last Seen</div><div class="v">' + (d.time ? new Date(d.time).toLocaleString() : '-') + '</div></div>' +
    '<div class="actions" style="margin-top:16px">' +
    '<select id="ban-dur-' + idx + '"><option value="0">Permanent</option><option value="24">24 hours</option><option value="72">3 days</option><option value="168">7 days</option><option value="720">30 days</option></select>' +
    '<button class="btn-ban" onclick="banDevice(' + idx + ')">&#x1F534; Ban</button>' +
    '<button class="btn-unban" onclick="unbanDevice(' + idx + ')">&#x1F7E2; Unban</button>' +
    '</div></div>';
}

function getBanIds(d) {
  const ids = [];
  if (d.pc && d.pc.trim()) ids.push(d.pc.trim().toLowerCase());
  if (d.hwid && d.hwid.trim()) ids.push(d.hwid.trim().toLowerCase());
  return ids;
}

async function banDevice(idx) {
  const d = devices[idx];
  if (!d) return;
  const ids = getBanIds(d);
  if (!ids.length) { toast('No PC name or HWID to ban', 'e'); return; }
  const dur = document.getElementById('ban-dur-' + idx).value;
  for (const id of ids) {
    const e = id + (dur === '0' ? '' : ':' + dur + 'h');
    if (!blacklist.bans.includes(e)) blacklist.bans.push(e);
    blacklist.unbans = blacklist.unbans.filter(u => u !== id);
  }
  try {
    await saveBlacklist();
    renderBlacklist();
    renderDeviceList();
    selectDevice(idx);
    toast('Banned: ' + ids.join(', ') + (dur !== '0' ? ' for ' + dur + 'h' : ' permanently'), 's');
  } catch(e) { toast('Failed to save: ' + e.message, 'e'); }
}

async function unbanDevice(idx) {
  const d = devices[idx];
  if (!d) return;
  const ids = getBanIds(d);
  if (!ids.length) { toast('No PC name or HWID', 'e'); return; }
  for (const id of ids) {
    blacklist.bans = blacklist.bans.filter(b => b.split(':')[0].toLowerCase() !== id);
    if (!blacklist.unbans.includes(id)) blacklist.unbans.push(id);
  }
  try {
    await saveBlacklist();
    renderBlacklist();
    renderDeviceList();
    selectDevice(idx);
    toast('Unbanned: ' + ids.join(', '), 's');
  } catch(e) { toast('Failed to save: ' + e.message, 'e'); }
}

async function manualBan() {
  const input = document.getElementById('manual-id');
  const dur = document.getElementById('manual-dur').value;
  const id = input.value.trim().toLowerCase();
  if (!id) { toast('Enter a PC name or HWID', 'e'); return; }
  const e = id + (dur === '0' ? '' : ':' + dur + 'h');
  if (!blacklist.bans.includes(e)) blacklist.bans.push(e);
  blacklist.unbans = blacklist.unbans.filter(u => u !== id);
  try {
    await saveBlacklist();
    renderBlacklist();
    renderDeviceList();
    input.value = '';
    toast('Banned: ' + e, 's');
  } catch(e2) { toast('Failed to save: ' + e2.message, 'e'); }
}

async function removeBan(entry) {
  blacklist.bans = blacklist.bans.filter(b => b !== entry);
  try {
    await saveBlacklist();
    renderBlacklist();
    renderDeviceList();
    toast('Removed: ' + entry.split(':')[0], 's');
  } catch(e) { toast('Failed: ' + e.message, 'e'); }
}

async function removeUnban(id) {
  blacklist.unbans = blacklist.unbans.filter(u => u !== id);
  try {
    await saveBlacklist();
    renderBlacklist();
    toast('Unban entry removed: ' + id, 's');
  } catch(e) { toast('Failed: ' + e.message, 'e'); }
}

function renderBlacklist() {
  const tbody = document.getElementById('banlist-body');
  document.getElementById('banlist').style.display = 'block';
  const rows = [];
  const now = new Date();
  for (const b of blacklist.bans) {
    const parts = b.split(':');
    const id = parts[0];
    const dur = parts.slice(1).join(':');
    let dLabel, cls;
    if (!dur) { dLabel = 'Permanent'; cls = 'tag-perm'; }
    else { dLabel = dur; cls = 'tag-time'; }
    rows.push('<tr><td><span class="mono">' + esc(id) + '</span></td><td><span class="' + cls + '">' + esc(dLabel) + '</span></td><td>Gist</td><td><button class="btn-sm btn-unban" style="padding:3px 10px" onclick="removeBan(\'' + esc(b) + '\')">Remove</button></td></tr>');
  }
  for (const u of blacklist.unbans) {
    rows.push('<tr><td><span class="mono">' + esc(u) + '</span></td><td><span class="tag-unban">Unbanned</span></td><td>Gist</td><td><button class="btn-sm" style="padding:3px 10px;background:#585878;color:#fff" onclick="removeUnban(\'' + esc(u) + '\')">Remove</button></td></tr>');
  }
  tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="4" class="nodata" style="padding:20px">No blacklist entries</td></tr>';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

let toastTimer;
function toast(msg, t) {
  const el = document.createElement('div');
  el.className = 'toast ' + (t || 'i');
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('manual-id').addEventListener('keydown', e => { if (e.key === 'Enter') manualBan(); });
</script>
</body>
</html>
