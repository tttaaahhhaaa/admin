<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SteamToolsLua</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;color:#d0d0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
#login h1{font-size:20px;color:#b088ff;font-weight:600}
#login p{color:#686880;font-size:13px;margin-bottom:6px}
#login input{padding:10px 14px;border-radius:6px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:14px;width:270px;outline:none}
#login input:focus{border-color:#7c6fff}
#login button{padding:10px;border-radius:6px;border:none;background:#7c6fff;color:#fff;font-size:14px;cursor:pointer;width:270px;font-weight:500}
#login button:hover{background:#6a5ee8}
#login .err{color:#f56565;font-size:13px;display:none}
#app{display:none;height:100vh;flex-direction:column}
.top{background:#0f0f1a;border-bottom:1px solid #1e1e3a;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.top h1{font-size:15px;color:#b088ff;font-weight:600}
.top .inf{color:#686880;font-size:12px}
.top .r{display:flex;gap:8px;align-items:center}
.top .r button{padding:5px 12px;border-radius:4px;border:1px solid #2a2a4a;background:transparent;color:#888;font-size:12px;cursor:pointer}
.top .r button:hover{color:#d0d0e0;border-color:#7c6fff}
.tabs{display:flex;background:#0d0d18;border-bottom:1px solid #1a1a30;flex-shrink:0}
.tabs .tab{padding:9px 20px;font-size:13px;color:#686880;cursor:pointer;border-bottom:2px solid transparent}
.tabs .tab:hover{color:#d0d0e0}
.tabs .tab.act{color:#b088ff;border-bottom-color:#7c6fff}
.body{display:flex;flex:1;overflow:hidden}
.side{width:280px;background:#0d0d18;border-right:1px solid #1a1a30;display:flex;flex-direction:column;flex-shrink:0}
.side .sh{padding:10px 12px 6px;display:flex;justify-content:space-between;align-items:center}
.side .sh h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.side .sh input{padding:4px 8px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px;outline:none;width:120px}
.side .sh input:focus{border-color:#7c6fff}
#devlist{flex:1;overflow-y:auto;padding:4px 8px}
.di{padding:7px 10px;border-radius:4px;cursor:pointer;margin-bottom:1px;border:1px solid transparent}
.di:hover{background:#141428;border-color:#2a2a4a}
.di.sel{background:#1a1a35;border-color:#7c6fff}
.di .n{font-size:13px;color:#d0d0e0;display:flex;justify-content:space-between}
.di .n .b{font-size:10px;color:#f56565;background:#f5656515;padding:0 5px;border-radius:3px}
.di .m{font-size:11px;color:#585878;margin-top:2px}
.man{padding:10px 12px;border-top:1px solid #1a1a30;flex-shrink:0}
.man h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.man .r{display:flex;gap:5px}
.man input{padding:5px 8px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px;outline:none;flex:1;min-width:0}
.man input:focus{border-color:#7c6fff}
.man select{padding:5px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px}
.man button{padding:5px 12px;border-radius:4px;border:none;background:#f56565;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.main{flex:1;padding:20px;overflow-y:auto}
.main .p{background:#0f0f1a;border:1px solid #1a1a30;border-radius:8px;padding:20px;margin-bottom:14px}
.main .p .i{display:flex;margin-bottom:5px;font-size:13px}
.main .p .i .l{color:#686880;width:80px;flex-shrink:0}
.main .p .i .v{color:#d0d0e0;word-break:break-all}
.main .p .i .v.m{font-family:'SF Mono','Cascadia Code',monospace;font-size:12px}
.main .p .a{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.main .p .a select{padding:5px 8px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px}
.main .p .a button{padding:6px 14px;border-radius:4px;border:none;font-size:12px;cursor:pointer;font-weight:500}
.bb{background:#f56565;color:#fff}.bb:hover{background:#e05050}
.bu{background:#48bb78;color:#fff}.bu:hover{background:#3ca868}
.tbl{margin-top:4px}
.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:6px 8px;border-bottom:2px solid #1a1a30;color:#7c6fff;font-weight:600;font-size:11px;text-transform:uppercase}
.tbl td{padding:6px 8px;border-bottom:1px solid #141428}
.tbl tr:hover td{background:#0d0d18}
.tbl .del{padding:2px 8px;border-radius:3px;border:none;cursor:pointer;font-size:11px}
.empty{text-align:center;color:#585878;padding:60px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty .ic{font-size:40px;margin-bottom:10px;opacity:.3}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #2a2a4a;border-top-color:#7c6fff;border-radius:50%;animation:s .6s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:6px;color:#fff;font-size:13px;z-index:999;animation:f .3s;max-width:350px}
.toast.s{background:#48bb78}.toast.e{background:#f56565}.toast.i{background:#7c6fff}
@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0a10}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
</style>
</head>
<body>

<div id="login">
  <h1>Admin Panel</h1>
  <p>SteamToolsLua v2.2.0</p>
  <input type="password" id="pw" placeholder="Password" autocomplete="off">
  <button onclick="go()">Enter</button>
  <div class="err" id="l_err">Wrong password</div>
</div>

<div id="app">
  <div class="top">
    <div><h1>Admin Panel</h1></div>
    <div class="inf" id="info">Loading...</div>
    <div class="r">
      <button onclick="load()">&#x21bb; Refresh</button>
      <button onclick="document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('pw').value='';document.getElementById('l_err').style.display='none'">Logout</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab act" id="tb_d" onclick="switchTab('devices')">Devices</div>
    <div class="tab" id="tb_u" onclick="switchTab('users')">Users</div>
    <div class="tab" id="tb_b" onclick="switchTab('blacklist')">Blacklist</div>
  </div>
  <div class="body">
    <div class="side" id="side_devices">
      <div class="sh">
        <h3>Devices</h3>
        <input id="q" placeholder="Search..." oninput="render()">
      </div>
      <div id="devlist"></div>
      <div class="man">
        <h3>Manual Ban</h3>
        <div class="r">
          <input id="mid" placeholder="PC name or HWID">
          <select id="mdur"><option value="0">Perm</option><option value="24">24h</option><option value="72">3d</option><option value="168">7d</option><option value="720">30d</option></select>
          <button onclick="mban()">Ban</button>
        </div>
      </div>
    </div>
    <div class="side" id="side_users" style="display:none">
      <div class="sh">
        <h3>Users</h3>
        <input id="uq" placeholder="Search..." oninput="renderUsers()">
      </div>
      <div id="userlist"></div>
    </div>
    <div class="main">
      <div id="detail"></div>
      <div id="blist" style="display:none">
        <div class="p" style="padding:12px 16px"><h2 style="font-size:14px;color:#b088ff">Blacklist</h2></div>
        <div class="tbl"><table><thead><tr><th>Identifier</th><th>Duration</th><th></th></tr></thead><tbody id="blbody"></tbody></table></div>
      </div>
      <div id="usermain" style="display:none">
        <div id="userdetail"></div>
      </div>
    </div>
  </div>
</div>

<script>
const _pw = 'RWtyZW0wNTc5';
const _gist = '6f3df9ed457b97936420526d5f5a431b';
const _t = 'github_pat_11BOBFHHQ0gJPQnX00BuTU_SQu4ULpKLzSJU86SduIXgchRNa8YdW1RjVFFAXo' + 'PaaM2TL7SWRKyc3dT8ju';
const _api = 'https://api.github.com/gists/' + _gist;

let T = '', devices = [], users = [], bl = {bans:[],unbans:[]}, sel = -1, usel = -1, curTab = 'devices';

function h() { return {Authorization:'token '+T,'User-Agent':'AP','Accept':'application/vnd.github.v3+json'} }

function go() {
  if (btoa(document.getElementById('pw').value)===_pw) { T=_t; document.getElementById('login').style.display='none'; document.getElementById('app').style.display='flex'; load() }
  else document.getElementById('l_err').style.display='block'
}

async function load() {
  document.getElementById('devlist').innerHTML='<div style="text-align:center;padding:20px;color:#585878"><div class="spin"></div></div>';
  document.getElementById('detail').innerHTML='<div class="empty"><div class="ic">&#128187;</div><p>Select a device</p></div>';
  document.getElementById('userlist').innerHTML='<div style="text-align:center;padding:20px;color:#585878"><div class="spin"></div></div>';
  document.getElementById('userdetail').innerHTML='<div class="empty"><div class="ic">&#128100;</div><p>Select a user</p></div>';
  try {
    const r = await fetch(_api, {headers:h()});
    if (!r.ok) throw Error();
    const d = await r.json();
    const fc = d.files||{};
    const df = fc['devices.json'];
    devices = df&&df.content?JSON.parse(df.content):[];
    if(!Array.isArray(devices)) devices=[];
    const uf = fc['users.json'];
    users = uf&&uf.content?JSON.parse(uf.content):[];
    if(!Array.isArray(users)) users=[];
    const bf = fc['blacklist.json'];
    if(bf&&bf.content) { bl=JSON.parse(bf.content); if(!bl.bans) bl.bans=[]; if(!bl.unbans) bl.unbans=[] }
    else bl={bans:[],unbans:[]}
  } catch(e) { devices=[]; users=[]; bl={bans:[],unbans:[]} }
  render(); renderUsers(); renderBl()
}

function bId(id) {
  if(!id) return false;
  const l=id.toLowerCase();
  if(bl.unbans.includes(l)) return false;
  return bl.bans.some(b=>b.split(':')[0].toLowerCase()===l)
}

function render() {
  const el=document.getElementById('devlist');
  const q=document.getElementById('q').value.toLowerCase().trim();
  if(!devices.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No devices</div>'; info(); return }
  const s=[...devices].reverse();
  const f=q?s.filter(d=>(d.user&&d.user.toLowerCase().includes(q))||(d.pc&&d.pc.toLowerCase().includes(q))||(d.hwid&&d.hwid.toLowerCase().includes(q))):s;
  if(!f.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No match</div>'; info(); return }
  el.innerHTML=f.map((d,i)=>{
    const ri=devices.indexOf(d);
    const a=ri===sel?' sel':'';
    const bb=bId(d.pc)||bId(d.hwid);
    const nm=d.user||d.pc||'?';
    const tm=d.time?new Date(d.time).toLocaleString():'';
    return '<div class="di'+a+'" onclick="selD('+ri+')"><div class="n"><span>'+esc(nm)+(bb?' <span class="b">BANNED</span>':'')+'</span></div><div class="m">'+esc(d.pc||'')+(d.hwid?' &middot; '+d.hwid.substring(0,8)+'...':'')+' &middot; '+tm+'</div></div>'
  }).join('');
  info()
}

function info() {
  let bc=0;
  for(const b of bl.bans){const id=b.split(':')[0].toLowerCase();if(!bl.unbans.includes(id)) bc++}
  document.getElementById('info').textContent=devices.length+' devices | '+users.length+' users | '+bc+' banned'
}

function selD(i) {
  sel=i; render();
  const d=devices[i];
  if(!d) return;
  const el=document.getElementById('detail');
  document.getElementById('blist').style.display='block';
  document.getElementById('usermain').style.display='none';
  const nm=d.user||d.pc||'Unknown';
  const bb=bId(d.pc)||bId(d.hwid);
  el.innerHTML='<div class="p"><h2 style="font-size:15px;color:#b088ff;margin-bottom:10px">'+esc(nm)+(bb?' <span style="font-size:11px;color:#f56565;background:#f5656515;padding:1px 6px;border-radius:3px">BANNED</span>':'')+'</h2>'+
    '<div class="i"><div class="l">Username</div><div class="v">'+esc(d.user||'-')+'</div></div>'+
    '<div class="i"><div class="l">PC Name</div><div class="v m">'+esc(d.pc||'-')+'</div></div>'+
    '<div class="i"><div class="l">HWID</div><div class="v m" style="font-size:11px">'+esc(d.hwid||'-')+'</div></div>'+
    '<div class="i"><div class="l">IP</div><div class="v m">'+esc(d.ip||'-')+'</div></div>'+
    '<div class="i"><div class="l">Last Seen</div><div class="v">'+(d.time?new Date(d.time).toLocaleString():'-')+'</div></div>'+
    '<div class="a"><select id="bd'+i+'"><option value="0">Permanent</option><option value="24">24h</option><option value="72">3d</option><option value="168">7d</option><option value="720">30d</option></select>'+
    '<button class="bb" onclick="bD('+i+')">Ban</button>'+
    '<button class="bu" onclick="uD('+i+')">Unban</button></div></div>'
}

function getIds(d){const r=[];if(d.pc&&d.pc.trim())r.push(d.pc.trim().toLowerCase());if(d.hwid&&d.hwid.trim())r.push(d.hwid.trim().toLowerCase());return r}

async function bD(i){
  const d=devices[i];if(!d)return;
  const ids=getIds(d);if(!ids.length){toast('No ID to ban','e');return}
  const dur=document.getElementById('bd'+i).value;
  for(const id of ids){const e=id+(dur==='0'?'':':'+dur+'h');if(!bl.bans.includes(e))bl.bans.push(e);bl.unbans=bl.unbans.filter(u=>u!==id)}
  try{await save();renderBl();render();selD(i);toast('Banned: '+ids.join(', ')+(dur!=='0'?' for '+dur+'h':''),'s')}catch(e){toast('Save failed','e')}
}

async function uD(i){
  const d=devices[i];if(!d)return;
  const ids=getIds(d);if(!ids.length){toast('No ID','e');return}
  for(const id of ids){bl.bans=bl.bans.filter(b=>b.split(':')[0].toLowerCase()!==id);if(!bl.unbans.includes(id))bl.unbans.push(id)}
  try{await save();renderBl();render();selD(i);toast('Unbanned: '+ids.join(', '),'s')}catch(e){toast('Save failed','e')}
}

async function mban(){
  const inp=document.getElementById('mid'),dur=document.getElementById('mdur').value,id=inp.value.trim().toLowerCase();
  if(!id){toast('Enter an ID','e');return}
  const e=id+(dur==='0'?'':':'+dur+'h');
  if(!bl.bans.includes(e))bl.bans.push(e);
  bl.unbans=bl.unbans.filter(u=>u!==id);
  try{await save();renderBl();render();inp.value='';toast('Banned: '+e,'s')}catch(e2){toast('Save failed','e')}
}

async function rBan(entry){bl.bans=bl.bans.filter(b=>b!==entry);try{await save();renderBl();render();toast('Removed: '+entry.split(':')[0],'s')}catch(e){toast('Failed','e')}}

async function rUnban(id){bl.unbans=bl.unbans.filter(u=>u!==id);try{await save();renderBl();toast('Unban removed: '+id,'s')}catch(e){toast('Failed','e')}}

async function save(){await fetch(_api,{method:'PATCH',headers:h(),body:JSON.stringify({files:{'blacklist.json':{content:JSON.stringify(bl,null,2)}}})})}

function renderBl(){
  document.getElementById('blist').style.display='block';
  const t=document.getElementById('blbody');
  const rows=[];
  for(const b of bl.bans){const p=b.split(':');const id=p[0];const dur=p.slice(1).join(':');rows.push('<tr><td><span style="font-family:monospace;font-size:12px">'+esc(id)+'</span></td><td>'+(!dur?'<span style="color:#f56565">Permanent</span>':'<span style="color:#48bb78">'+esc(dur)+'</span>')+'</td><td><button class="bu del" onclick="rBan(\''+esc(b)+'\')">Remove</button></td></tr>')}
  for(const u of bl.unbans)rows.push('<tr><td><span style="font-family:monospace;font-size:12px;color:#686880">'+esc(u)+'</span></td><td><span style="color:#686880">Unbanned</span></td><td><button class="del" style="background:#585878;color:#fff" onclick="rUnban(\''+esc(u)+'\')">Remove</button></td></tr>');
  t.innerHTML=rows.length?rows.join(''):'<tr><td colspan="3" style="text-align:center;color:#585878;padding:16px">No entries</td></tr>'
}

function switchTab(tab) {
  curTab = tab;
  const tb = {devices:'tb_d', users:'tb_u', blacklist:'tb_b'};
  for (const t of Object.values(tb)) document.getElementById(t).classList.remove('act');
  document.getElementById(tb[tab]).classList.add('act');
  document.getElementById('side_devices').style.display = tab === 'devices' ? 'flex' : 'none';
  document.getElementById('side_users').style.display = tab === 'users' ? 'flex' : 'none';
  document.getElementById('detail').style.display = tab === 'devices' ? 'block' : 'none';
  document.getElementById('blist').style.display = tab === 'blacklist' ? 'block' : 'none';
  document.getElementById('usermain').style.display = tab === 'users' ? 'block' : 'none';
}

// ---- Users ----
function renderUsers() {
  const el = document.getElementById('userlist');
  const q = document.getElementById('uq').value.toLowerCase().trim();
  if (!users.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No registered users</div>'; return }
  const f = q ? users.filter(u => (u.username&&u.username.toLowerCase().includes(q))||(u.fullname&&u.fullname.toLowerCase().includes(q))||(u.email&&u.email.toLowerCase().includes(q))) : users;
  if (!f.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No match</div>'; return }
  el.innerHTML = f.map((u,i) => {
    const ri = users.indexOf(u);
    const a = ri===usel?' sel':'';
    const bb = u.banned;
    const v = u.verified ? '&#10003;' : '&#10007;';
    return '<div class="di'+a+'" onclick="selU('+ri+')"><div class="n"><span>'+esc(u.username)+(bb?' <span class="b">BANNED</span>':'')+'</span><span style="font-size:10px;color:#585878">'+v+'</span></div><div class="m">'+esc(u.fullname||'')+' &middot; '+esc(u.email||'')+'</div></div>'
  }).join('');
}

function selU(i) {
  usel = i; renderUsers();
  const u = users[i];
  if (!u) return;
  const el = document.getElementById('userdetail');
  document.getElementById('usermain').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
  document.getElementById('blist').style.display = 'none';
  el.innerHTML = '<div class="p"><h2 style="font-size:15px;color:#b088ff;margin-bottom:10px">'+esc(u.username)+(u.banned?' <span style="font-size:11px;color:#f56565;background:#f5656515;padding:1px 6px;border-radius:3px">BANNED</span>':'')+'</h2>'+
    '<div class="i"><div class="l">Full Name</div><div class="v">'+esc(u.fullname||'-')+'</div></div>'+
    '<div class="i"><div class="l">Email</div><div class="v">'+esc(u.email||'-')+'</div></div>'+
    '<div class="i"><div class="l">Verified</div><div class="v">'+(u.verified?'<span style="color:#48bb78">Yes</span>':'<span style="color:#f56565">No</span>')+'</div></div>'+
    '<div class="i"><div class="l">Registered</div><div class="v">'+(u.registered_at?new Date(u.registered_at).toLocaleString():'-')+'</div></div>'+
    '<div class="i"><div class="l">HWID</div><div class="v m" style="font-size:11px">'+esc(u.hwid||'-')+'</div></div>'+
    '<div class="a">'+
    (u.banned
      ? '<button class="bu" onclick="unbanUser('+i+')">Unban User</button>'
      : '<button class="bb" onclick="banUser('+i+')">Ban User</button>')+
    '</div></div>';
  // Show user devices
  const userDevices = devices.filter(d => d.user === u.username || d.hwid === u.hwid);
  if (userDevices.length) {
    el.innerHTML += '<div class="p"><h3 style="font-size:13px;color:#b088ff;margin-bottom:8px">User Devices ('+userDevices.length+')</h3>'+
      userDevices.map(d => '<div class="i"><div class="l">'+esc(d.pc||'?')+'</div><div class="v">'+(d.time?new Date(d.time).toLocaleString():'')+'</div></div>').join('')+'</div>';
  }
}

async function banUser(i) {
  const u = users[i];
  if (!u) return;
  u.banned = true;
  // also add to blacklist by username
  const e = u.username.toLowerCase();
  if (!bl.bans.includes(e+':perm')) bl.bans.push(e+':perm');
  bl.unbans = bl.unbans.filter(x => x !== e);
  try {
    await Promise.all([
      fetch(_api, {method:'PATCH', headers:h(), body:JSON.stringify({files:{'users.json':{content:JSON.stringify(users,null,2)}}})}),
      fetch(_api, {method:'PATCH', headers:h(), body:JSON.stringify({files:{'blacklist.json':{content:JSON.stringify(bl,null,2)}}})})
    ]);
    renderUsers(); selU(i); renderBl(); toast('Banned: '+u.username,'s');
  } catch(e2) { toast('Save failed','e') }
}

async function unbanUser(i) {
  const u = users[i];
  if (!u) return;
  u.banned = false;
  const e = u.username.toLowerCase();
  bl.bans = bl.bans.filter(b => b.split(':')[0].toLowerCase() !== e);
  if (!bl.unbans.includes(e)) bl.unbans.push(e);
  try {
    await Promise.all([
      fetch(_api, {method:'PATCH', headers:h(), body:JSON.stringify({files:{'users.json':{content:JSON.stringify(users,null,2)}}})}),
      fetch(_api, {method:'PATCH', headers:h(), body:JSON.stringify({files:{'blacklist.json':{content:JSON.stringify(bl,null,2)}}})})
    ]);
    renderUsers(); selU(i); renderBl(); toast('Unbanned: '+u.username,'s');
  } catch(e2) { toast('Save failed','e') }
}
