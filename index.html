<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SteamToolsLua</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;color:#d0d0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
#login h1{font-size:20px;color:#b088ff;font-weight:600}
#login p{color:#686880;font-size:13px;margin-bottom:6px}
#login input{padding:10px 14px;border-radius:6px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:14px;width:270px;outline:none}
#login input:focus{border-color:#7c6fff}
#login button{padding:10px;border-radius:6px;border:none;background:#7c6fff;color:#fff;font-size:14px;cursor:pointer;width:270px;font-weight:500}
#login button:hover{background:#6a5ee8}
#login .err{color:#f56565;font-size:13px;display:none}
#app{display:none;height:100vh;flex-direction:column}
.top{background:#0f0f1a;border-bottom:1px solid #1e1e3a;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.top h1{font-size:15px;color:#b088ff;font-weight:600}
.top .inf{color:#686880;font-size:12px}
.top .r{display:flex;gap:8px;align-items:center}
.top .r button{padding:5px 12px;border-radius:4px;border:1px solid #2a2a4a;background:transparent;color:#888;font-size:12px;cursor:pointer}
.top .r button:hover{color:#d0d0e0;border-color:#7c6fff}
.body{display:flex;flex:1;overflow:hidden}
.side{width:280px;background:#0d0d18;border-right:1px solid #1a1a30;display:flex;flex-direction:column;flex-shrink:0}
.side .sh{padding:10px 12px 6px;display:flex;justify-content:space-between;align-items:center}
.side .sh h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.side .sh input{padding:4px 8px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px;outline:none;width:120px}
.side .sh input:focus{border-color:#7c6fff}
#devlist{flex:1;overflow-y:auto;padding:4px 8px}
.di{padding:7px 10px;border-radius:4px;cursor:pointer;margin-bottom:1px;border:1px solid transparent}
.di:hover{background:#141428;border-color:#2a2a4a}
.di.sel{background:#1a1a35;border-color:#7c6fff}
.di .n{font-size:13px;color:#d0d0e0;display:flex;justify-content:space-between}
.di .n .b{font-size:10px;color:#f56565;background:#f5656515;padding:0 5px;border-radius:3px}
.di .m{font-size:11px;color:#585878;margin-top:2px}
.man{padding:10px 12px;border-top:1px solid #1a1a30;flex-shrink:0}
.man h3{font-size:11px;color:#7c6fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.man .r{display:flex;gap:5px;flex-wrap:wrap}
.man input{padding:5px 8px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px;outline:none;min-width:0}
.man input:focus{border-color:#7c6fff}
.man select{padding:5px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px}
.man button{padding:5px 12px;border-radius:4px;border:none;background:#f56565;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.main{flex:1;padding:20px;overflow-y:auto}
.main .p{background:#0f0f1a;border:1px solid #1a1a30;border-radius:8px;padding:20px;margin-bottom:14px}
.main .p .i{display:flex;margin-bottom:5px;font-size:13px}
.main .p .i .l{color:#686880;width:80px;flex-shrink:0}
.main .p .i .v{color:#d0d0e0;word-break:break-all}
.main .p .i .v.m{font-family:'SF Mono','Cascadia Code',monospace;font-size:12px}
.main .p .a{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.main .p .a input[type=number]{padding:5px 6px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px;outline:none;width:55px;text-align:center}
.main .p .a input[type=number]:focus{border-color:#7c6fff}
.main .p .a select{padding:5px 6px;border-radius:4px;border:1px solid #2a2a4a;background:#12121e;color:#d0d0e0;font-size:12px}
.main .p .a button{padding:6px 14px;border-radius:4px;border:none;font-size:12px;cursor:pointer;font-weight:500}
.main .p .a .del2{background:#8b0000;color:#fff}.del2:hover{background:#aa0000}
.main .p .a label{font-size:12px;color:#686880;display:flex;align-items:center;gap:3px;cursor:pointer}
.main .p .a input[type=checkbox]{accent-color:#7c6fff;cursor:pointer}
.times{font-size:11px;color:#585878;margin-top:8px;max-height:150px;overflow-y:auto}
.times div{padding:2px 0;border-bottom:1px solid #141428}
.loc{font-size:12px;color:#48bb78}
.bb{background:#f56565;color:#fff}.bb:hover{background:#e05050}
.bu{background:#48bb78;color:#fff}.bu:hover{background:#3ca868}
.tbl{margin-top:4px}
.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:6px 8px;border-bottom:2px solid #1a1a30;color:#7c6fff;font-weight:600;font-size:11px;text-transform:uppercase}
.tbl td{padding:6px 8px;border-bottom:1px solid #141428}
.tbl tr:hover td{background:#0d0d18}
.tbl .del{padding:2px 8px;border-radius:3px;border:none;cursor:pointer;font-size:11px}
.empty{text-align:center;color:#585878;padding:60px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty .ic{font-size:40px;margin-bottom:10px;opacity:.3}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #2a2a4a;border-top-color:#7c6fff;border-radius:50%;animation:s .6s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:6px;color:#fff;font-size:13px;z-index:999;animation:f .3s;max-width:350px}
.toast.s{background:#48bb78}.toast.e{background:#f56565}.toast.i{background:#7c6fff}
@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0a10}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
</style>
</head>
<body>

<div id="login">
  <h1>Admin Panel</h1>
  <p>SteamToolsLua v2.2.0</p>
  <input type="password" id="pw" placeholder="Password" autocomplete="off">
  <button onclick="go()">Enter</button>
  <div class="err" id="l_err">Wrong password</div>
</div>

<div id="app">
  <div class="top">
    <div><h1>Admin Panel</h1></div>
    <div class="inf" id="info">Loading...</div>
    <div class="r">
      <button onclick="load()">&#x21bb; Refresh</button>
      <button onclick="document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('pw').value='';document.getElementById('l_err').style.display='none'">Logout</button>
    </div>
  </div>
  <div class="body">
    <div class="side">
      <div class="sh">
        <h3>Devices</h3>
        <input id="q" placeholder="Search..." oninput="render()">
      </div>
      <div id="devlist"></div>
      <div class="man">
        <h3>Manual Ban</h3>
        <div class="r">
          <input id="mid" placeholder="PC name or HWID" style="flex:1;min-width:80px">
          <input type="number" id="mdn" value="24" min="1" style="width:50px">
          <select id="mdu"><option value="m">dk</option><option value="h" selected>sa</option><option value="d">gün</option></select>
          <label style="font-size:11px;color:#686880;display:flex;align-items:center;gap:2px"><input type="checkbox" id="mdperm"> srsz</label>
          <button onclick="mban()">Ban</button>
        </div>
      </div>
    </div>
    <div class="main">
      <div id="detail"></div>
      <div id="blist" style="display:none">
        <div class="p" style="padding:12px 16px"><h2 style="font-size:14px;color:#b088ff">Blacklist</h2></div>
        <div class="tbl"><table><thead><tr><th>Identifier</th><th>Duration</th><th>Expiry / Remaining</th><th></th></tr></thead><tbody id="blbody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script>
const _pw = 'RWtyZW0wNTc5';
const _gist = '6f3df9ed457b97936420526d5f5a431b';
const _t = 'github_pat_11BOBFHHQ0gJPQnX00BuTU_SQu4ULpKLzSJU86SduIXgchRNa8YdW1RjVFFAXo' + 'PaaM2TL7SWRKyc3dT8ju';
const _api = 'https://api.github.com/gists/' + _gist;

let T = '', devices = [], bl = {bans:[],unbans:[]}, selKey = '';

function h() { return {Authorization:'token '+T,'User-Agent':'AP','Accept':'application/vnd.github.v3+json'} }

function go() {
  if (btoa(document.getElementById('pw').value)===_pw) { T=_t; document.getElementById('login').style.display='none'; document.getElementById('app').style.display='flex'; load() }
  else document.getElementById('l_err').style.display='block'
}

async function load() {
  document.getElementById('devlist').innerHTML='<div style="text-align:center;padding:20px;color:#585878"><div class="spin"></div></div>';
  document.getElementById('detail').innerHTML='<div class="empty"><div class="ic">&#128187;</div><p>Select a device</p></div>';
  try {
    const r = await fetch(_api, {headers:h()});
    if (!r.ok) throw Error();
    const d = await r.json();
    const fc = d.files||{};
    const df = fc['devices.json'];
    devices = df&&df.content?JSON.parse(df.content):[];
    if(!Array.isArray(devices)) devices=[];
    const bf = fc['blacklist.json'];
    if(bf&&bf.content) { bl=JSON.parse(bf.content); if(!bl.bans) bl.bans=[]; if(!bl.unbans) bl.unbans=[] }
    else bl={bans:[],unbans:[]}
  } catch(e) { devices=[]; bl={bans:[],unbans:[]} }
  render(); renderBl()
}

function bId(id) {
  if(!id) return false;
  const l=id.toLowerCase();
  if(bl.unbans.includes(l)) return false;
  return bl.bans.some(b=>b.split(':')[0].toLowerCase()===l)
}

function groupDevs(arr) {
  const g = {};
  for (const d of arr) {
    if (!d.pc && !d.hwid) continue;
    const k = (d.pc||'') + '|' + (d.hwid||'');
    if (!g[k]) g[k] = [];
    g[k].push(d);
  }
  const groups = Object.entries(g).map(([k, entries]) => {
    entries.sort((a,b) => (b.time||'').localeCompare(a.time||''));
    return {key: k, entries, latest: entries[0]};
  });
  groups.sort((a,b) => (b.latest.time||'').localeCompare(a.latest.time||''));
  return groups;
}

function render() {
  const el=document.getElementById('devlist');
  const q=document.getElementById('q').value.toLowerCase().trim();
  const groups = groupDevs(devices);
  if(!groups.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No devices</div>'; info(); return }
  const f = q ? groups.filter(g => {
    const d = g.latest;
    return (d.pc&&d.pc.toLowerCase().includes(q))||(d.hwid&&d.hwid.toLowerCase().includes(q));
  }) : groups;
  if(!f.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#585878;font-size:13px">No match</div>'; info(); return }
  el.innerHTML=f.map(g => {
    const d = g.latest;
    const a = g.key===selKey?' sel':'';
    const bb = bId(d.pc)||bId(d.hwid);
    return '<div class="di'+a+'" onclick="selGroup(\''+g.key+'\')"><div class="n"><span>'+esc(d.pc||'?')+(bb?' <span class="b">BANNED</span>':'')+'</span><span style="font-size:10px;color:#585878">'+g.entries.length+'x</span></div><div class="m">'+(d.hwid?d.hwid.substring(0,8)+'...':'')+'</div></div>'
  }).join('');
  info()
}

function info() {
  let bc=0;
  for(const b of bl.bans){const id=b.split(':')[0].toLowerCase();if(!bl.unbans.includes(id)) bc++}
  const groups = groupDevs(devices);
  document.getElementById('info').textContent=groups.length+' unique | '+devices.length+' total | '+bc+' banned'
}

async function getLocation(ip) {
  try {
    const r = await fetch('http://ip-api.com/json/'+ip+'?fields=country,city,isp');
    if (!r.ok) return '';
    const d = await r.json();
    if (d.status==='fail') return '';
    return (d.country||'') + (d.city?', '+d.city:'') + (d.isp?' ('+d.isp+')':'');
  } catch(e) { return '' }
}

function selGroup(key) {
  selKey = key; render();
  const g = groupDevs(devices).find(x=>x.key===key);
  if (!g) return;
  const d = g.latest;
  const el = document.getElementById('detail');
  document.getElementById('blist').style.display='block';
  const bb = bId(d.pc)||bId(d.hwid);
  el.innerHTML='<div class="p"><h2 style="font-size:15px;color:#b088ff;margin-bottom:10px">'+esc(d.pc||'?')+(bb?' <span style="font-size:11px;color:#f56565;background:#f5656515;padding:1px 6px;border-radius:3px">BANNED</span>':'')+' <span class="loc" id="locspan">&#8987;</span></h2>'+
    '<div class="i"><div class="l">PC Name</div><div class="v m">'+esc(d.pc||'-')+'</div></div>'+
    '<div class="i"><div class="l">HWID</div><div class="v m" style="font-size:11px">'+esc(d.hwid||'-')+'</div></div>'+
    '<div class="i"><div class="l">IP</div><div class="v m" id="iploc">'+esc(d.ip||'-')+'</div></div>'+
    (g.entries.length>1?'<div class="times"><b>Login Times ('+g.entries.length+'):</b>'+g.entries.map(e => '<div>'+(e.time?new Date(e.time).toLocaleString():'-')+'</div>').join('')+'</div>':'')+
    '<div class="a">'+
    '<input type="number" id="bdn" value="24" min="1">'+
    '<select id="bdu"><option value="m">dk</option><option value="h" selected>sa</option><option value="d">gün</option></select>'+
    '<label><input type="checkbox" id="bdperm"> süresiz</label>'+
    '<button class="bb" onclick="bGroup(\''+key+'\')">Ban All</button>'+
    '<button class="bu" onclick="uGroup(\''+key+'\')">Unban All</button>'+
    '<button class="del2" onclick="delGroup(\''+key+'\')">Sil</button></div></div>';
  if (d.ip && d.ip !== 'unknown') {
    getLocation(d.ip).then(loc => {
      const ipEl = document.getElementById('iploc');
      const ls = document.getElementById('locspan');
      if (ls) ls.textContent = loc ? '\u{1F30D}' : '';
      if (ipEl && loc) ipEl.textContent = d.ip + ' \u279C ' + loc;
    });
  }
}

function getGroupIds(g) {
  const d = g.latest;
  const ids = [];
  if(d.pc&&d.pc.trim()) ids.push(d.pc.trim().toLowerCase());
  if(d.hwid&&d.hwid.trim()) ids.push(d.hwid.trim().toLowerCase());
  return ids;
}

function makeBanStr(id) {
  if (document.getElementById('bdperm').checked) return id;
  const n = parseInt(document.getElementById('bdn').value) || 24;
  const u = document.getElementById('bdu').value;
  const ts = new Date().toISOString().split('.')[0] + 'Z';
  return id + ':' + ts + ':' + n + u;
}

async function bGroup(key) {
  const g = groupDevs(devices).find(x=>x.key===key); if(!g)return;
  const ids=getGroupIds(g); if(!ids.length){toast('No ID to ban','e');return}
  for(const id of ids){const e=makeBanStr(id);if(!bl.bans.includes(e))bl.bans.push(e);bl.unbans=bl.unbans.filter(u=>u!==id)}
  try{await saveBl();renderBl();render();selGroup(key);toast('Banned: '+ids.join(', '),'s')}catch(e){toast('Save failed','e')}
}

async function uGroup(key) {
  const g = groupDevs(devices).find(x=>x.key===key); if(!g)return;
  const ids=getGroupIds(g); if(!ids.length){toast('No ID','e');return}
  for(const id of ids){bl.bans=bl.bans.filter(b=>b.split(':')[0].toLowerCase()!==id);if(!bl.unbans.includes(id))bl.unbans.push(id)}
  try{await saveBl();renderBl();render();selGroup(key);toast('Unbanned: '+ids.join(', '),'s')}catch(e){toast('Save failed','e')}
}

async function delGroup(key) {
  if (!confirm('Bu cihazi sil? ('+key+')')) return;
  const g = groupDevs(devices).find(x=>x.key===key); if(!g)return;
  for (const e of g.entries) {
    const idx = devices.indexOf(e);
    if (idx>=0) devices.splice(idx,1);
  }
  try {
    const r = await fetch(_api, {method:'PATCH', headers:h(), body:JSON.stringify({files:{'devices.json':{content:JSON.stringify(devices,null,2)}}})});
    if (!r.ok) throw Error();
    selKey = ''; render(); renderBl();
    document.getElementById('detail').innerHTML='<div class="empty"><div class="ic">&#128187;</div><p>Select a device</p></div>';
    toast('Cihaz silindi ('+g.entries.length+' kayit)','s');
  } catch(e) { toast('Silme hatasi','e') }
}

async function mban(){
  const inp=document.getElementById('mid'),id=inp.value.trim().toLowerCase();
  if(!id){toast('Enter an ID','e');return}
  let e;
  if (document.getElementById('mdperm').checked) {
    e = id;
  } else {
    const n = parseInt(document.getElementById('mdn').value) || 24;
    const u = document.getElementById('mdu').value;
    const ts = new Date().toISOString().split('.')[0] + 'Z';
    e = id + ':' + ts + ':' + n + u;
  }
  if(!bl.bans.includes(e))bl.bans.push(e);
  bl.unbans=bl.unbans.filter(u=>u!==id);
  try{await saveBl();renderBl();render();inp.value='';toast('Banned: '+e,'s')}catch(e2){toast('Save failed','e')}
}

async function rBan(entry){bl.bans=bl.bans.filter(b=>b!==entry);try{await saveBl();renderBl();render();toast('Removed: '+entry.split(':')[0],'s')}catch(e){toast('Failed','e')}}
async function rUnban(id){bl.unbans=bl.unbans.filter(u=>u!==id);try{await saveBl();renderBl();toast('Unban removed: '+id,'s')}catch(e){toast('Failed','e')}}
async function saveBl(){await fetch(_api,{method:'PATCH',headers:h(),body:JSON.stringify({files:{'blacklist.json':{content:JSON.stringify(bl,null,2)}}})})}

function parseBan(b) {
  const p = b.split(':');
  const id = p[0];
  if (p.length === 1) return {id, perm:true, old:false, remaining:null};
  if (p.length === 2) return {id, perm:true, old:true, remaining:null};
  // id:timestamp:duration
  const ts = p[1];
  const dur = p[2];
  const now = Date.now();
  const start = new Date(ts).getTime();
  if (isNaN(start)) return {id, perm:true, old:true, remaining:null};
  let secs = 0;
  if (dur.endsWith('m')) secs = parseInt(dur) * 60;
  else if (dur.endsWith('h')) secs = parseInt(dur) * 3600;
  else if (dur.endsWith('d')) secs = parseInt(dur) * 86400;
  else return {id, perm:true, old:true, remaining:null};
  const end = start + secs * 1000;
  const rem = Math.floor((end - now) / 1000);
  return {id, perm:false, old:false, remaining: rem > 0 ? rem : 0};
}

function renderBl(){
  document.getElementById('blist').style.display='block';
  const t=document.getElementById('blbody');
  const rows=[];
  for(const b of bl.bans){
    const p = parseBan(b);
    let durText, remText;
    if (p.perm) {
      durText = '<span style="color:#f56565">Permanent</span>';
      remText = p.old ? '<span style="color:#686880;font-size:11px">(eski kayit)</span>' : '';
    } else if (p.remaining <= 0) {
      durText = '<span style="color:#686880">Suresi doldu</span>';
      remText = '<span style="color:#48bb78">Bitti</span>';
    } else {
      const h = Math.floor(p.remaining / 3600);
      const m = Math.floor((p.remaining % 3600) / 60);
      durText = '<span style="color:#e8a050">'+p.dur+'</span>';
      remText = '<span style="color:#48bb78">'+(h>0?h+'s ':'')+m+'dk kaldi</span>';
    }
    rows.push('<tr><td><span style="font-family:monospace;font-size:12px">'+esc(p.id)+'</span></td><td>'+durText+'</td><td>'+remText+'</td><td><button class="bu del" onclick="rBan(\''+esc(b)+'\')">Remove</button></td></tr>');
  }
  for(const u of bl.unbans)rows.push('<tr><td><span style="font-family:monospace;font-size:12px;color:#686880">'+esc(u)+'</span></td><td><span style="color:#686880">Unbanned</span></td><td></td><td><button class="del" style="background:#585878;color:#fff" onclick="rUnban(\''+esc(u)+'\')">Remove</button></td></tr>');
  t.innerHTML=rows.length?rows.join(''):'<tr><td colspan="4" style="text-align:center;color:#585878;padding:16px">No entries</td></tr>'
}

function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let _tt;
function toast(m,t){const e=document.createElement('div');e.className='toast '+(t||'i');e.textContent=m;document.body.appendChild(e);clearTimeout(_tt);_tt=setTimeout(()=>{if(e.parentNode)e.parentNode.removeChild(e)},3000)}

document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go()})
document.getElementById('mid').addEventListener('keydown',e=>{if(e.key==='Enter')mban()})
</script>
</body>
</html>
